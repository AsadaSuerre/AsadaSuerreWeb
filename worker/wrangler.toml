name = "asada-suerre-api"
main = "index.ts"
compatibility_date = "2024-01-01"

# D1 Database binding
[[d1_databases]]
binding = "asada_suerre_db"
database_name = "asada-suerre-db"
database_id = "2e128980-9cfb-4fe0-9526-c9b6880f2a1d"

# R2 Bucket binding for images
[[r2_buckets]]
bucket_name = "asada-suerre-images"
binding = "asada_suerre_images"

# Local development configuration
[vars]
ENVIRONMENT = "local"
IMAGE_BASE_URL = "http://localhost:8787/images"

# JWT Secret for authentication (CHANGE THIS IN PRODUCTION!)
# Generate a secure random string: openssl rand -base64 32
JWT_SECRET = "SECRET_KEY"
