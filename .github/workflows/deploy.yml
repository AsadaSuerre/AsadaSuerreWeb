name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'worker/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'wrangler.toml'
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '24.15.0'

jobs:
  # Test job
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm test -- --watchAll=false --coverage
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella

  # Build and deploy worker
  deploy-worker:
    name: Deploy Worker
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    environment:
      name: production
      url: https://api.acueductosuerre.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json
      
      - name: Install worker dependencies
        run: |
          cd worker
          npm ci
      
      - name: Deploy to Cloudflare Workers (Production)
        run: |
          cd worker
          wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      
      - name: Notify deployment
        if: success()
        run: |
          echo "Worker deployed successfully to production"

  # Deploy worker to staging
  deploy-worker-staging:
    name: Deploy Worker to Staging
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    environment:
      name: staging
      url: https://api-staging.acueductosuerre.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json
      
      - name: Install worker dependencies
        run: |
          cd worker
          npm ci
      
      - name: Deploy to Cloudflare Workers (Staging)
        run: |
          cd worker
          wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # Deploy frontend to Cloudflare Pages
  deploy-frontend:
    name: Deploy Frontend
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    environment:
      name: production
      url: https://www.acueductosuerre.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build React app
        run: npm run build:production
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}
          REACT_APP_IMAGE_BASE_URL: ${{ secrets.REACT_APP_IMAGE_BASE_URL }}
          REACT_APP_ENVIRONMENT: production
      
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: asada-suerre-web
          directory: build
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Notify deployment
        if: success()
        run: |
          echo "Frontend deployed successfully to production"

  # Deploy frontend to staging
  deploy-frontend-staging:
    name: Deploy Frontend to Staging
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    environment:
      name: staging
      url: https://staging.acueductosuerre.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build React app
        run: npm run build:staging
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL_STAGING }}
          REACT_APP_IMAGE_BASE_URL: ${{ secrets.REACT_APP_IMAGE_BASE_URL_STAGING }}
          REACT_APP_ENVIRONMENT: staging
      
      - name: Deploy to Cloudflare Pages (Staging)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: asada-suerre-web-staging
          directory: build
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: staging
